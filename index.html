<title>Convite — OAB Santana de Parnaíba</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1c1c1c;font-family:'EB Garamond',serif;display:flex;flex-direction:column;align-items:center;padding:28px 16px;min-height:100vh}
h1{font-family:'Cinzel',serif;font-size:1rem;color:#c8a96e;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;text-align:center}

/* === PAINEL EDITOR === */
.editor{background:#111;border:1px solid #333;border-radius:12px;padding:20px 22px;width:100%;max-width:960px;margin-bottom:24px}
.editor-title{font-family:'Cinzel',serif;font-size:0.72rem;color:#c8a96e;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid #333;padding-bottom:8px;margin-bottom:16px}
.row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.ef{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.ef.wide{flex:2;min-width:360px}
.ef label{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:#666}
.ef input,.ef textarea{background:#1a1a1a;border:1px solid #3a3a3a;color:#e8dcc8;border-radius:6px;padding:7px 10px;font-family:'EB Garamond',serif;font-size:1rem;outline:none;transition:border-color 0.2s;width:100%}
.ef input:focus,.ef textarea:focus{border-color:#c8a96e}
.ef textarea{resize:vertical;min-height:60px;line-height:1.5}
.btns{display:flex;gap:10px;flex-wrap:wrap;padding-top:4px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;text-transform:uppercase;font-weight:600}
.btn:hover{opacity:0.82}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,#c8a96e,#8a6030);color:#fff}
.btn-green{background:linear-gradient(135deg,#5a8a5a,#2a5a2a);color:#fff}
.btn-outline{background:transparent;border:1px solid #c8a96e;color:#c8a96e}

/* === CONVITE === */
.wrap{width:100%;max-width:960px;display:flex;justify-content:center;overflow-x:auto}

#convite{
  width:960px;height:672px;
  background:#f6f4ef;
  position:relative;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
  flex-shrink:0;
}

.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#fdfbf6 0%,#ece8de 100%)}

/* === BORDA ORNAMENTAL === */
/* Linhas duplas */
.bline{position:absolute;background:#222}
.bline.top   {top:18px;left:18px;right:18px;height:2px}
.bline.top2  {top:22px;left:18px;right:18px;height:1px;background:#555}
.bline.bot   {bottom:18px;left:18px;right:18px;height:2px}
.bline.bot2  {bottom:22px;left:18px;right:18px;height:1px;background:#555}
.bline.lft   {left:18px;top:18px;bottom:18px;width:2px}
.bline.lft2  {left:22px;top:18px;bottom:18px;width:1px;background:#555}
.bline.rgt   {right:18px;top:18px;bottom:18px;width:2px}
.bline.rgt2  {right:22px;top:18px;bottom:18px;width:1px;background:#555}

/* Ornamentos nos cantos e no centro das bordas — SVG inline */
.orn{position:absolute;z-index:3}
.orn-tl{top:6px;left:6px}
.orn-tr{top:6px;right:6px;transform:scaleX(-1)}
.orn-bl{bottom:6px;left:6px;transform:scaleY(-1)}
.orn-br{bottom:6px;right:6px;transform:scale(-1,-1)}
.orn-tc{top:4px;left:50%;transform:translateX(-50%)}
.orn-bc{bottom:4px;left:50%;transform:translateX(-50%)}
.orn-lc{left:4px;top:50%;transform:translateY(-50%)}
.orn-rc{right:4px;top:50%;transform:translateY(-50%)}

/* Linha horizontal divisória interna */
.hdiv{position:absolute;left:60px;right:60px;height:1px;background:linear-gradient(to right,transparent,#888 20%,#888 80%,transparent)}

/* Conteúdo */
.inv{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
  padding:44px 100px 36px;
  gap:0;
}

/* Logo OAB */
.logo-area{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.oab-svg{flex-shrink:0}
.logo-divider{width:1px;height:52px;background:#2a3540;opacity:0.5}
.logo-text{display:flex;flex-direction:column;gap:1px}
.logo-subsecao{font-family:'EB Garamond',serif;font-size:0.78rem;color:#2a3540;line-height:1.35;font-weight:400}
.logo-comissao{font-family:'EB Garamond',serif;font-size:0.78rem;color:#2a3540;line-height:1.35;font-weight:600}
.logo-sp{font-family:'Cinzel',serif;font-size:0.62rem;color:#2a3540;letter-spacing:3px;margin-top:4px}

/* Textos */
.intro{font-family:'EB Garamond',serif;font-size:1.05rem;color:#2a3540;text-align:center;line-height:1.7;margin-bottom:12px}
.nome-dest{font-family:'Cinzel',serif;font-size:1.45rem;color:#1a1a1a;text-align:center;letter-spacing:2px;font-weight:600;margin-bottom:10px;line-height:1.2}
.cargo{font-family:'EB Garamond',serif;font-size:1.05rem;color:#2a3540;text-align:center;line-height:1.6;font-style:italic;margin-bottom:10px}
.evento{font-family:'Cinzel',serif;font-size:1.3rem;color:#1a1a1a;text-align:center;letter-spacing:3px;font-weight:600;margin-bottom:10px}
.detalhes{font-family:'EB Garamond',serif;font-size:1rem;color:#2a3540;text-align:center;line-height:1.7;margin-bottom:8px}
.endereco{font-family:'EB Garamond',serif;font-size:0.82rem;color:#555;text-align:center;line-height:1.5;margin-top:4px}

/* linha decorativa tênue */
.thin-rule{width:340px;height:1px;background:linear-gradient(to right,transparent,#aaa 30%,#aaa 70%,transparent);margin:6px auto}
</style>
</head>

      <div class="cargo" id="r-cargo" style="margin-top:4px"></div>

      <div class="thin-rule" style="margin:6px auto"></div>

      <div class="evento" id="r-evento"></div>

      <div class="thin-rule" style="margin:8px auto"></div>

      <div class="detalhes" id="r-detalhes"></div>

      <div class="endereco" id="r-endereco" style="margin-top:6px"></div>
    </div>
  </div>
</div>

<script>
function g(id){return document.getElementById(id)}

function nl2br(str){return str.replace(/\n/g,'<br>')}

function render(){
  g('r-subsecao').innerHTML = g('f-subsecao').value.replace('Santana de Parnaíba','<br>Santana de Parnaíba');
  g('r-comissao').innerHTML  = g('f-comissao').value.replace('das ','das<br>');
  g('r-abertura').innerHTML  = nl2br(g('f-abertura').value);
  g('r-nome').textContent    = g('f-nome').value;
  g('r-cargo').innerHTML     = nl2br(g('f-cargo').value);
  g('r-evento').textContent  = g('f-evento').value;
  g('r-detalhes').innerHTML  = nl2br(g('f-detalhes').value);
  g('r-endereco').textContent= g('f-endereco').value;
}

/* ===== DOWNLOAD IMAGEM ===== */
function baixarImg(){
  html2canvas(g('convite'),{scale:2,useCORS:true,backgroundColor:'#f6f4ef'}).then(canvas=>{
    const a=document.createElement('a');
    a.download='convite_oab_dia_mulher.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
}

/* ===== IMPRIMIR ===== */
function imprimir(){
  html2canvas(g('convite'),{scale:2,backgroundColor:'#f6f4ef'}).then(canvas=>{
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>Convite OAB</title>
    <style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#fff}
    img{max-width:100%;max-height:100vh}</style></head>
    <body><img src="${canvas.toDataURL()}" onload="window.print()"></body></html>`);
    w.document.close();
  });
}

/* ===== DOWNLOAD WORD ===== */
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function para(text,opts){
  opts=opts||{};
  const sz=opts.sz||24;
  const color=opts.color||'2A3540';
  const bold=opts.bold?'<w:b/>':'';
  const ital=opts.ital?'<w:i/>':'';
  const before=opts.before!==undefined?opts.before:0;
  const after=opts.after!==undefined?opts.after:120;
  const align=opts.align||'center';
  const spacing=opts.spacing?`<w:spacing w:val="${opts.spacing}"/>`:'';
  const shade=opts.shade?`<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>`:'';
  const bdr=opts.bdrB?`<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="888888"/></w:pBdr>`:'';
  const bdrT=opts.bdrT?`<w:pBdr><w:top w:val="single" w:sz="4" w:space="4" w:color="888888"/></w:pBdr>`:'';
  // múltiplas linhas
  const lines = text.split('\n');
  const runs = lines.map((line,i)=>{
    const br = i<lines.length-1?'<w:r><w:br/></w:r>':'';
    return `<w:r><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${color}"/>${bold}${ital}${spacing}</w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r>${br}`;
  }).join('');
  return `<w:p><w:pPr><w:jc w:val="${align}"/><w:spacing w:before="${before}" w:after="${after}"/>${shade}${bdr}${bdrT}</w:pPr>${runs}</w:p>`;
}

function hrLine(){
  return `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="60" w:after="60"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="AAAAAA"/></w:pBdr></w:pPr></w:p>`;
}

function sp(b,a){
  b=b||0;a=a!==undefined?a:80;
  return `<w:p><w:pPr><w:spacing w:before="${b}" w:after="${a}"/></w:pPr></w:p>`;
}

async function baixarWord(){
  const btn=g('btnWord');
  btn.disabled=true; btn.textContent='⏳ Gerando...';
  try{
    const d={
      subsecao: g('f-subsecao').value,
      comissao: g('f-comissao').value,
      cidade: g('f-cidade-logo').value,
      abertura: g('f-abertura').value,
      nome: g('f-nome').value,
      cargo: g('f-cargo').value,
      evento: g('f-evento').value,
      detalhes: g('f-detalhes').value,
      endereco: g('f-endereco').value,
    };

    const docXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>
${sp(200,80)}
${para('OAB — '+d.cidade,{sz:18,color:'FFFFFF',bold:true,shade:'2A3540',before:80,after:80})}
${para(d.subsecao,{sz:20,color:'2A3540',before:0,after:40})}
${para(d.comissao,{sz:20,color:'2A3540',bold:true,before:0,after:80})}
${hrLine()}
${sp(60,60)}
${para(d.abertura,{sz:24,color:'2A3540',ital:true,before:0,after:100})}
${hrLine()}
${para(d.nome,{sz:36,color:'111111',bold:true,before:100,after:100})}
${hrLine()}
${para(d.cargo,{sz:26,color:'2A3540',ital:true,before:80,after:80})}
${hrLine()}
${para(d.evento,{sz:36,color:'111111',bold:true,before:80,after:80})}
${hrLine()}
${sp(60,60)}
${para(d.detalhes,{sz:22,color:'2A3540',before:0,after:80})}
${hrLine()}
${para(d.endereco,{sz:18,color:'666666',before:80,after:200})}
<w:sectPr>
  <w:pgSz w:w="17280" w:h="12240" w:orient="landscape"/>
  <w:pgMar w:top="720" w:right="900" w:bottom="720" w:left="900" w:header="0" w:footer="0"/>
  <w:pgBorders w:offsetFrom="page" w:zOrder="front">
    <w:top    w:val="doubleWave" w:sz="18" w:space="20" w:color="1a1a1a"/>
    <w:left   w:val="doubleWave" w:sz="18" w:space="20" w:color="1a1a1a"/>
    <w:bottom w:val="doubleWave" w:sz="18" w:space="20" w:color="1a1a1a"/>
    <w:right  w:val="doubleWave" w:sz="18" w:space="20" w:color="1a1a1a"/>
  </w:pgBorders>
</w:sectPr>
</w:body></w:document>`;

    const zip=new JSZip();
    zip.file('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/></Types>`);
    zip.folder('_rels').file('.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
    zip.folder('word').folder('_rels').file('document.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/></Relationships>`);
    zip.folder('word').file('settings.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:defaultTabStop w:val="720"/></w:settings>`);
    zip.folder('word').file('styles.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="24"/><w:szCs w:val="24"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>`);
    zip.folder('word').file('document.xml',docXml);

    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='convite_oab_dia_mulher.docx'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    alert('Erro ao gerar Word: '+e.message);
  }
  btn.disabled=false; btn.textContent='📄 Baixar Word (.docx)';
}

render();
</script>
</body>
</html>

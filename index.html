<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite — OAB Santana de Parnaíba</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1c1c1c;font-family:'EB Garamond',serif;display:flex;flex-direction:column;align-items:center;padding:28px 16px;min-height:100vh}
h1{font-family:'Cinzel',serif;font-size:1rem;color:#d4799e;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;text-align:center}

.editor{background:#111;border:1px solid #333;border-radius:12px;padding:20px 22px;width:100%;max-width:980px;margin-bottom:24px}
.editor-title{font-family:'Cinzel',serif;font-size:0.72rem;color:#d4799e;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid #333;padding-bottom:8px;margin-bottom:16px}
.row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.ef{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.ef.wide{flex:2;min-width:360px}
.ef label{font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:#666}
.ef input,.ef textarea{background:#1a1a1a;border:1px solid #3a3a3a;color:#e8dcc8;border-radius:6px;padding:7px 10px;font-family:'EB Garamond',serif;font-size:1rem;outline:none;transition:border-color 0.2s;width:100%}
.ef input:focus,.ef textarea:focus{border-color:#d4799e}
.ef textarea{resize:vertical;min-height:60px;line-height:1.5}
.btns{display:flex;gap:10px;flex-wrap:wrap;padding-top:4px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;text-transform:uppercase;font-weight:600}
.btn:hover{opacity:0.82}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn-rose{background:linear-gradient(135deg,#c06090,#8b3560);color:#fff}
.btn-green{background:linear-gradient(135deg,#5a8a5a,#2a5a2a);color:#fff}
.btn-outline{background:transparent;border:1px solid #d4799e;color:#d4799e}

.wrap{width:100%;max-width:980px;display:flex;justify-content:center;overflow-x:auto}

#convite{
  width:960px;height:672px;
  background:#fdfaf6;
  position:relative;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
  flex-shrink:0;
}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#fffcf8 0%,#f7efe8 100%)}
#borderCanvas{position:absolute;inset:0;z-index:1;pointer-events:none}

.inv{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;
  padding:52px 105px 36px;
}
.logo-area{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.logo-divider{width:1px;height:52px;background:#2a3540;opacity:0.4}
.logo-text{display:flex;flex-direction:column;gap:2px}
.logo-sub{font-family:'EB Garamond',serif;font-size:0.77rem;color:#2a3540;line-height:1.35}
.logo-com{font-family:'EB Garamond',serif;font-size:0.77rem;color:#2a3540;line-height:1.35;font-weight:600}
.thin-rule{width:400px;height:1px;background:linear-gradient(to right,transparent,#c06090 30%,#c06090 70%,transparent);margin:5px auto}
.intro{font-family:'EB Garamond',serif;font-size:1.04rem;color:#2a3540;text-align:center;line-height:1.75;margin:8px 0}
.nome{font-family:'Cinzel',serif;font-size:1.38rem;color:#111;text-align:center;letter-spacing:1.5px;font-weight:600;margin:6px 0;line-height:1.25}
.cargo{font-family:'EB Garamond',serif;font-size:1.03rem;color:#2a3540;text-align:center;line-height:1.65;font-style:italic;margin:4px 0}
.evento{font-family:'Cinzel',serif;font-size:1.26rem;color:#111;text-align:center;letter-spacing:2.5px;font-weight:600;margin:6px 0}
.detalhes{font-family:'EB Garamond',serif;font-size:0.97rem;color:#2a3540;text-align:center;line-height:1.75;margin:6px 0}
.endereco{font-family:'EB Garamond',serif;font-size:0.79rem;color:#666;text-align:center;line-height:1.5;margin-top:4px}
</style>
</head>
<body>
<h1>✿ Gerador de Convite — OAB</h1>

<div class="editor">
  <div class="editor-title">✿ Editar Conteúdo</div>
  <div class="row">
    <div class="ef"><label>Subseção</label><input id="f-sub" value="Subseção Santana de Parnaíba" oninput="render()"></div>
    <div class="ef"><label>Comissão</label><input id="f-com" value="Comissão das Mulheres Advogadas" oninput="render()"></div>
    <div class="ef"><label>Cidade (logo)</label><input id="f-cidade" value="SÃO PAULO" oninput="render()"></div>
  </div>
  <div class="row">
    <div class="ef wide"><label>Texto de Abertura</label>
      <textarea id="f-abertura" oninput="render()">A Ordem dos Advogados do Brasil,
247ª Subseção de Santana de Parnaíba,
por meio de sua Diretoria e da Comissão das Mulheres Advogadas,
tem a elevada honra de convidar</textarea>
    </div>
  </div>
  <div class="row">
    <div class="ef wide"><label>Nome da Homenageada</label>
      <input id="f-nome" value="ILMA. SRA. DRA. NATALIA RODRIGUES LOPES" oninput="render()">
    </div>
  </div>
  <div class="row">
    <div class="ef wide"><label>Cargo / Texto após o nome</label>
      <textarea id="f-cargo" oninput="render()">Presidente da Comissão da Jovem Advocacia
para ser homenageada em comemoração ao</textarea>
    </div>
  </div>
  <div class="row">
    <div class="ef"><label>Título do Evento</label>
      <input id="f-evento" value="DIA INTERNACIONAL DA MULHER" oninput="render()">
    </div>
  </div>
  <div class="row">
    <div class="ef wide"><label>Data / Local / Detalhes</label>
      <textarea id="f-detalhes" oninput="render()">A realizar-se no dia 31 de março de 2026, às 15h,
na sede da OAB Santana de Parnaíba.
Após a solenidade, será oferecido um café especial, como forma de
celebração, integração e reconhecimento.</textarea>
    </div>
  </div>
  <div class="row">
    <div class="ef wide"><label>Endereço</label>
      <input id="f-end" value="Endereço: Rua Alberto Frediani, 770 – Jardim Frediani – Santana de Parnaíba – CEP 06502-155" oninput="render()">
    </div>
  </div>
  <div class="btns">
    <button class="btn btn-rose" id="btnWord" onclick="baixarWord()">📄 Baixar Word (.docx)</button>
    <button class="btn btn-green" onclick="baixarImg()">🖼 Baixar Imagem (.png)</button>
    <button class="btn btn-outline" onclick="imprimir()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="wrap">
  <div id="convite">
    <div class="bg"></div>
    <canvas id="borderCanvas" width="960" height="672"></canvas>
    <div class="inv">
      <div class="logo-area">
        <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#2a3540"/>
          <text x="32" y="28" font-family="Georgia,serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">OAB</text>
          <text x="32" y="45" font-family="Georgia,serif" font-size="6.5" fill="white" text-anchor="middle" id="r-cidade">SÃO PAULO</text>
        </svg>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <span class="logo-sub" id="r-sub"></span>
          <span style="display:block;height:3px"></span>
          <span class="logo-com" id="r-com"></span>
        </div>
      </div>
      <div class="thin-rule"></div>
      <div class="intro"   id="r-abertura"></div>
      <div class="thin-rule"></div>
      <div class="nome"    id="r-nome"></div>
      <div class="cargo"   id="r-cargo"></div>
      <div class="thin-rule"></div>
      <div class="evento"  id="r-evento"></div>
      <div class="thin-rule"></div>
      <div class="detalhes" id="r-detalhes"></div>
      <div class="endereco" id="r-end"></div>
    </div>
  </div>
</div>

<script>
/* =============================================
   BORDA DE FLORZINHAS ROSAS — CANVAS
   ============================================= */
function flower(ctx, x, y, r, petals, pCol, cCol) {
  // pétalas
  for (let i = 0; i < petals; i++) {
    const a = (i / petals) * Math.PI * 2;
    const px = x + Math.cos(a) * r * 0.6;
    const py = y + Math.sin(a) * r * 0.6;
    ctx.beginPath();
    ctx.ellipse(px, py, r * 0.42, r * 0.26, a, 0, Math.PI * 2);
    ctx.fillStyle = pCol;
    ctx.fill();
  }
  // miolo
  ctx.beginPath();
  ctx.arc(x, y, r * 0.26, 0, Math.PI * 2);
  ctx.fillStyle = cCol;
  ctx.fill();
}

function leaf(ctx, x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.5, size * 0.18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(130,180,110,0.5)';
  ctx.fill();
  ctx.restore();
}

function bud(ctx, x, y, r, col) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = '#fff5f8'; ctx.fill();
}

function stem(ctx, x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = 'rgba(150,195,120,0.45)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBorder() {
  const cv  = document.getElementById('borderCanvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);

  const m   = 16;   // margem da borda
  const stp = 26;   // passo entre flores
  const fR  = 8;    // raio flor grande
  const bR  = 3.5;  // raio botão

  // Cores
  const P = ['#f2a8c4','#ee85ad','#e86898','#f5bdd4','#f9d0e2'];
  const C = ['#fff0f6','#ffd0e8','#f8a0c0'];

  // Distribuidor horizontal
  function rowH(y, x0, x1) {
    const n = Math.floor((x1 - x0) / stp);
    for (let i = 0; i <= n; i++) {
      const x = x0 + i * stp;
      const phase = i % 5;
      const px = x0 + (i + 0.5) * stp;
      if (i < n) stem(ctx, x + fR + 1, y, x + stp - fR - 1, y);
      if (phase === 0)      { flower(ctx, x, y, fR,     8, P[0], C[1]); }
      else if (phase === 1) { leaf(ctx, x, y, 12, 0); bud(ctx, x, y, bR, P[3]); }
      else if (phase === 2) { flower(ctx, x, y, fR - 1, 6, P[1], C[0]); }
      else if (phase === 3) { leaf(ctx, x, y, 11, 0.2); bud(ctx, x, y, bR, P[4]); }
      else                  { flower(ctx, x, y, fR,     8, P[2], C[2]); }
    }
  }

  // Distribuidor vertical
  function rowV(x, y0, y1) {
    const n = Math.floor((y1 - y0) / stp);
    for (let i = 0; i <= n; i++) {
      const y = y0 + i * stp;
      const phase = i % 5;
      if (i < n) stem(ctx, x, y + fR + 1, x, y + stp - fR - 1);
      if (phase === 0)      { flower(ctx, x, y, fR,     8, P[0], C[1]); }
      else if (phase === 1) { leaf(ctx, x, y, 12, Math.PI/2); bud(ctx, x, y, bR, P[3]); }
      else if (phase === 2) { flower(ctx, x, y, fR - 1, 6, P[1], C[0]); }
      else if (phase === 3) { leaf(ctx, x, y, 11, Math.PI/2 + 0.2); bud(ctx, x, y, bR, P[4]); }
      else                  { flower(ctx, x, y, fR,     8, P[2], C[2]); }
    }
  }

  // Desenha as 4 faixas (deixa espaço para os cantos)
  const corner = 38;
  rowH(m + 4,     m + corner, W - m - corner);  // topo
  rowH(H - m - 4, m + corner, W - m - corner);  // base
  rowV(m + 4,     m + corner, H - m - corner);  // esquerda
  rowV(W - m - 4, m + corner, H - m - corner);  // direita

  // CANTOS — buquê de flores maior
  const corners = [
    { cx: m + 4,     cy: m + 4,     sx: 1,  sy: 1  },
    { cx: W - m - 4, cy: m + 4,     sx: -1, sy: 1  },
    { cx: m + 4,     cy: H - m - 4, sx: 1,  sy: -1 },
    { cx: W - m - 4, cy: H - m - 4, sx: -1, sy: -1 },
  ];

  corners.forEach(({ cx, cy, sx, sy }) => {
    // flor central grande
    flower(ctx, cx, cy, fR + 4, 8, P[2], C[2]);
    // flores ao redor
    const around = [
      { dx: 18, dy: 0,  r: fR,     p: P[0], c: C[1] },
      { dx: 0,  dy: 18, r: fR,     p: P[1], c: C[0] },
      { dx: 13, dy: 13, r: fR - 1, p: P[4], c: C[1] },
      { dx: 22, dy: 10, r: fR - 2, p: P[3], c: C[2] },
      { dx: 10, dy: 22, r: fR - 2, p: P[0], c: C[1] },
    ];
    around.forEach(o => {
      flower(ctx, cx + o.dx * sx, cy + o.dy * sy, o.r, 6, o.p, o.c);
    });
    // folhas
    leaf(ctx, cx + 14 * sx, cy + 4  * sy, 14, sx > 0 ? 0.3  : Math.PI - 0.3);
    leaf(ctx, cx + 4  * sx, cy + 14 * sy, 14, sx > 0 ? 1.25 : Math.PI - 1.25);
    leaf(ctx, cx + 18 * sx, cy + 18 * sy, 12, sx > 0 ? 0.78 : Math.PI - 0.78);
    // botão extra
    bud(ctx, cx + 26 * sx, cy + 6  * sy, bR, P[3]);
    bud(ctx, cx + 6  * sx, cy + 26 * sy, bR, P[3]);
  });
}

/* =============================================
   RENDER CAMPOS
   ============================================= */
const g = id => document.getElementById(id);
const nl2br = s => s.replace(/\n/g, '<br>');

function render() {
  g('r-cidade').textContent = g('f-cidade').value;
  g('r-sub').innerHTML      = g('f-sub').value;
  g('r-com').innerHTML      = g('f-com').value;
  g('r-abertura').innerHTML = nl2br(g('f-abertura').value);
  g('r-nome').textContent   = g('f-nome').value;
  g('r-cargo').innerHTML    = nl2br(g('f-cargo').value);
  g('r-evento').textContent = g('f-evento').value;
  g('r-detalhes').innerHTML = nl2br(g('f-detalhes').value);
  g('r-end').textContent    = g('f-end').value;
}

/* =============================================
   DOWNLOADS
   ============================================= */
function baixarImg() {
  html2canvas(g('convite'), { scale: 2, useCORS: true, backgroundColor: '#fdfaf6' }).then(c => {
    const a = document.createElement('a');
    a.download = 'convite_oab.png'; a.href = c.toDataURL('image/png'); a.click();
  });
}

function imprimir() {
  html2canvas(g('convite'), { scale: 2, backgroundColor: '#fdfaf6' }).then(c => {
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Convite OAB</title>
    <style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
    img{max-width:100%}</style></head>
    <body><img src="${c.toDataURL()}" onload="window.print()"></body></html>`);
    w.document.close();
  });
}

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function para(text, o) {
  o = o || {};
  const sz = o.sz || 24, color = o.color || '2A3540';
  const bold = o.bold ? '<w:b/>' : '', ital = o.ital ? '<w:i/>' : '';
  const before = o.before !== undefined ? o.before : 0;
  const after  = o.after  !== undefined ? o.after  : 120;
  const shade  = o.shade  ? `<w:shd w:val="clear" w:color="auto" w:fill="${o.shade}"/>` : '';
  const runs = text.split('\n').map((line, i, arr) => {
    const br = i < arr.length - 1 ? '<w:r><w:br/></w:r>' : '';
    return `<w:r><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${color}"/>${bold}${ital}</w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r>${br}`;
  }).join('');
  return `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="${before}" w:after="${after}"/>${shade}</w:pPr>${runs}</w:p>`;
}

function hr() {
  return `<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="60" w:after="60"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="D4799E"/></w:pBdr></w:pPr></w:p>`;
}

async function baixarWord() {
  const btn = g('btnWord');
  btn.disabled = true; btn.textContent = '⏳ Gerando...';
  try {
    const d = {
      sub:      g('f-sub').value,
      com:      g('f-com').value,
      cidade:   g('f-cidade').value,
      abertura: g('f-abertura').value,
      nome:     g('f-nome').value,
      cargo:    g('f-cargo').value,
      evento:   g('f-evento').value,
      detalhes: g('f-detalhes').value,
      end:      g('f-end').value,
    };

    const doc = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>
<w:p><w:pPr><w:spacing w:before="160" w:after="0"/></w:pPr></w:p>
${para('OAB — ' + d.cidade, { sz: 18, color: 'FFFFFF', bold: true, shade: '2A3540', before: 60, after: 80 })}
${para(d.sub, { sz: 20, color: '2A3540', before: 0, after: 40 })}
${para(d.com, { sz: 20, color: '2A3540', bold: true, before: 0, after: 80 })}
${hr()}
${para(d.abertura, { sz: 24, color: '2A3540', ital: true, before: 80, after: 100 })}
${hr()}
${para(d.nome, { sz: 36, color: '111111', bold: true, before: 100, after: 100 })}
${hr()}
${para(d.cargo, { sz: 26, color: '2A3540', ital: true, before: 80, after: 80 })}
${hr()}
${para(d.evento, { sz: 36, color: '111111', bold: true, before: 80, after: 80 })}
${hr()}
${para(d.detalhes, { sz: 22, color: '2A3540', before: 80, after: 80 })}
${hr()}
${para(d.end, { sz: 17, color: '666666', before: 60, after: 160 })}
<w:sectPr>
  <w:pgSz w:w="17280" w:h="12240" w:orient="landscape"/>
  <w:pgMar w:top="720" w:right="900" w:bottom="720" w:left="900" w:header="0" w:footer="0"/>
  <w:pgBorders w:offsetFrom="page" w:zOrder="front">
    <w:top    w:val="floral" w:sz="24" w:space="20" w:color="D4799E"/>
    <w:left   w:val="floral" w:sz="24" w:space="20" w:color="D4799E"/>
    <w:bottom w:val="floral" w:sz="24" w:space="20" w:color="D4799E"/>
    <w:right  w:val="floral" w:sz="24" w:space="20" w:color="D4799E"/>
  </w:pgBorders>
</w:sectPr>
</w:body></w:document>`;

    const zip = new JSZip();
    zip.file('[Content_Types].xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/></Types>`);
    zip.folder('_rels').file('.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
    zip.folder('word').folder('_rels').file('document.xml.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/></Relationships>`);
    zip.folder('word').file('settings.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:defaultTabStop w:val="720"/></w:settings>`);
    zip.folder('word').file('styles.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="24"/><w:szCs w:val="24"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>`);
    zip.folder('word').file('document.xml', doc);

    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'convite_oab.docx'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) { alert('Erro: ' + e.message); }
  btn.disabled = false; btn.textContent = '📄 Baixar Word (.docx)';
}

render();
drawBorder();
</script>
</body>
</html>
